<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#2D3748"/>
  
  <!-- Left Hand (Rock/Fist) -->
  <!-- Wrist -->
  <rect x="8" y="30" width="6" height="10" rx="1" fill="#9F7AEA" stroke="#6B46C1" stroke-width="1.5"/>
  <!-- Palm/Fist -->
  <rect x="13" y="26" width="10" height="12" rx="2" fill="#B794F4" stroke="#6B46C1" stroke-width="1.5"/>
  <!-- Fingers curled -->
  <path d="M 14 26 Q 14 22 17 22 Q 20 22 20 26" fill="#9F7AEA" stroke="#6B46C1" stroke-width="1.5"/>
  <!-- Thumb -->
  <ellipse cx="13" cy="32" rx="3" ry="4" fill="#B794F4" stroke="#6B46C1" stroke-width="1.5"/>
  <!-- Knuckle highlights -->
  <circle cx="16" cy="26" r="1" fill="#E9D8FD" opacity="0.6"/>
  <circle cx="19" cy="26" r="1" fill="#E9D8FD" opacity="0.6"/>
  
  <!-- Right Hand (Scissors) -->
  <!-- Wrist -->
  <rect x="50" y="30" width="6" height="10" rx="1" fill="#9F7AEA" stroke="#6B46C1" stroke-width="1.5"/>
  <!-- Palm -->
  <ellipse cx="48" cy="32" rx="4" ry="5" fill="#B794F4" stroke="#6B46C1" stroke-width="1.5"/>
  <!-- Index finger (extended) -->
  <path d="M 47 29 L 47 20 Q 47 17 45 17 Q 43 17 43 20 L 43 25" 
        fill="#B794F4" stroke="#6B46C1" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Middle finger (extended) -->
  <path d="M 49 29 L 49 18 Q 49 15 51 15 Q 53 15 53 18 L 53 25" 
        fill="#B794F4" stroke="#6B46C1" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Folded fingers -->
  <path d="M 48 34 Q 50 36 52 34" fill="#9F7AEA" stroke="#6B46C1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Finger highlights -->
  <ellipse cx="45" cy="19" rx="1.5" ry="2" fill="#E9D8FD" opacity="0.5"/>
  <ellipse cx="51" cy="17" rx="1.5" ry="2" fill="#E9D8FD" opacity="0.5"/>
  
  <!-- VS symbol in middle -->
  <text x="32" y="50" font-family="Arial, sans-serif" font-size="10" font-weight="bold" 
        fill="#E9D8FD" text-anchor="middle">VS</text>
</svg>
